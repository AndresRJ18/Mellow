</div>

<div class="flex flex-col gap-4 mb-16 max-w-2xl">
<h2 class="text-on-surface font-light text-3xl md:text-5xl tracking-tight leading-tight">
                Find the music you are <span class="italic font-normal">right now</span>
</h2>
<p class="text-on-surface-variant text-sm md:text-base uppercase tracking-[0.2em] font-medium">
                Not what you listened to. Who you are.
            </p>
</div>
<!-- Primary CTA -->
<div class="flex flex-col items-center gap-8">
<button class="group relative px-12 py-4 border border-primary text-primary text-sm uppercase tracking-[0.2em] font-bold transition-all duration-500 glow-hover hover:bg-primary hover:text-on-primary active:scale-95">
                Start
            </button>
<!-- Secondary Data Point / Explore Hint -->
<div class="flex items-center gap-6 mt-12 opacity-50 hover:opacity-100 transition-opacity duration-300 cursor-pointer">
<span class="material-symbols-outlined text-primary text-sm">explore</span>
<span class="text-on-surface-variant text-[0.65rem] uppercase tracking-widest font-bold">Enter The Void</span>
</div>
</div>
</main>

<div class="flex flex-col gap-1">
<span class="text-primary text-[0.6rem] font-black uppercase tracking-tighter">System Status</span>

<div class="w-1.5 h-1.5 bg-primary shadow-[0_0_8px_#8eff71]"></div>
