<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>mellow — Onboarding</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>

              "on-error": "#450900",

              "on-tertiary-fixed-variant": "#005e63",
              "surface-tint": "#8eff71",
              "on-error-container": "#ffd2c8",
              "secondary-dim": "#d4d4d4",

              "on-primary-container": "#0b5800",
              "on-tertiary": "#005d62",
              "on-background": "#ffffff",
              "tertiary": "#88f6ff",
              "error-dim": "#d53d18",
              "surface-container-lowest": "#000000",
              "surface-container-highest": "#262626",

              "on-primary-fixed-variant": "#0d6200",
              "on-secondary": "#505252",
              "on-surface": "#ffffff",
              "outline-variant": "#494847",
              "on-surface-variant": "#adaaaa",
              "tertiary-dim": "#00deea",
              "error": "#ff7351",
              "surface-container": "#1a1919",
              "inverse-primary": "#106f00",

              "inverse-on-surface": "#565554",

<style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-particle {
            position: absolute;
            background-color: #8eff71;
            width: 2px;
            height: 2px;
            opacity: 0.2;
        }
    </style>
</head>
<body class="overflow-hidden selection:bg-primary selection:text-on-primary">
<!-- Kinetic Background Particles -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<div class="kinetic-particle top-1/4 left-1/4" style="animation: pulse 4s infinite"></div>
<div class="kinetic-particle top-3/4 left-1/3" style="animation: pulse 5s infinite 1s"></div>
<div class="kinetic-particle top-1/2 left-2/3" style="animation: pulse 3s infinite 0.5s"></div>
<div class="kinetic-particle top-1/5 left-4/5" style="animation: pulse 6s infinite 2s"></div>
<div class="kinetic-particle top-2/3 left-1/10" style="animation: pulse 4.5s infinite 1.5s"></div>
</div>
<!-- Onboarding Container -->
<main class="relative z-10 min-h-screen flex flex-col max-w-[1440px] mx-auto px-6 lg:px-24">
<!-- Progress Header -->
<header class="w-full py-12 flex flex-col items-center">
<div class="flex gap-4">
<!-- Dot 1: Active -->
<div class="w-3 h-3 bg-primary ring-4 ring-primary/20"></div>
<!-- Dot 2: Inactive -->
<div class="w-3 h-3 bg-surface-container-highest"></div>
<!-- Dot 3: Inactive -->
<div class="w-3 h-3 bg-surface-container-highest"></div>
</div>
<div class="mt-8">
<span class="text-primary font-black uppercase tracking-[0.3em] text-[0.65rem] font-label">Step 01 / Perception</span>
</div>
</header>
<!-- Main Input Content -->
<section class="flex-grow flex flex-col justify-center items-start space-y-24">
<div class="max-w-4xl">
<h1 class="text-5xl md:text-7xl lg:text-8xl font-black text-on-surface tracking-tighter leading-[0.95] mb-12">
                    How are you <br/>
<span class="text-on-surface-variant">right now?</span>
</h1>
<div class="relative w-full group">
<textarea class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant p-0 py-6 text-2xl md:text-3xl lg:text-4xl text-on-surface placeholder:text-surface-variant focus:ring-0 focus:border-primary transition-all duration-500 resize-none min-h-[200px]" placeholder="it's 2am and i just finished something hard..."></textarea>
<!-- Glow Line (Underline) -->
<div class="absolute bottom-0 left-0 w-0 h-[2px] bg-primary group-focus-within:w-full transition-all duration-700 shadow-[0_0_15px_rgba(142,255,113,0.5)]"></div>
</div>
<div class="mt-8 flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-sm">info</span>
<p class="text-on-surface-variant text-sm font-medium uppercase tracking-widest font-label">
                        Don't think. Just type the kinetic energy of your current state.
                    </p>
</div>
</div>
</section>
<!-- Footer Navigation -->
<footer class="w-full py-12 flex justify-between items-end">
<div class="hidden lg:block">
<p class="text-[0.65rem] text-surface-variant font-black uppercase tracking-[0.2em]">Mellow — The Kinetic Void</p>
</div>
<div class="flex flex-col items-end gap-6 w-full lg:w-auto">
<button class="group relative flex items-center gap-8 bg-transparent border border-primary px-10 py-5 text-primary hover:bg-primary hover:text-on-primary transition-all duration-300 w-full lg:w-auto overflow-hidden">
<span class="text-sm font-black uppercase tracking-[0.2em] relative z-10">Next →</span>
<!-- Hover Effect: Scale Up -->
<div class="absolute inset-0 bg-primary translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out z-0"></div>
</button>
<span class="text-[0.65rem] text-on-surface-variant font-medium uppercase tracking-[0.1em]">Press Enter to proceed</span>
</div>
</footer>
</main>
<!-- Visual Accents (Asymmetric Layout Elements) -->
<div class="fixed top-0 right-0 w-[1px] h-screen bg-surface-container-highest/20 pointer-events-none"></div>
<div class="fixed bottom-0 left-0 w-screen h-[1px] bg-surface-container-highest/20 pointer-events-none"></div>
<!-- Image for Visual Context (Hidden visually but provides semantic/decorative anchor) -->
<div class="sr-only">
<img data-alt="high-contrast abstract texture of dark ink swirling in pure black water with sharp neon green light fragments" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDkHSrHSrN84RYWw8pojA_KpFy5b_N4iRc2uB6Y9aylopaVYDBLvWmLjB3y5EdAVpsvs2qO_LxdfrPP0FfiQGAdjXDVk6l0heMMtF6sI0JEFcGBUQ9ka0SRtL-DSzB2wMxKthH7olclFyq92_MimbhbsqC73XOaJGrZ5iTd2glKr21A4qgCPNKrJnWp2SQq8DVe_gftT54EkKHk4ZOGcmO0_CelrY6cp40S99a4T9tKGScpKipdtjEIOoOwrG0rJ65-ryRq-XC1cdQ"/>
</div>
</body></html>
